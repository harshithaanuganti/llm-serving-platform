apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: llm-serving-platform
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/harshithaanuganti/llm-serving-platform.git
    targetRevision: main
    path: helm/vllm

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true