apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .Release.Name }}-vllm-scaler
spec:
  scaleTargetRef:
    name: {{ .Release.Name }}-vllm
  minReplicaCount: 2
  maxReplicaCount: 6
  pollingInterval: 15
  cooldownPeriod: 60
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: http_requests_per_second
        threshold: "5"
        query: sum(rate(http_requests_total{job="{{ .Release.Name }}-vllm", handler="/v1/generate"}[1m]))